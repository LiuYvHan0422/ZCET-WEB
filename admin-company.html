<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司信息 - 精品独立站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #409eff;
            --primary-dark: #337ecc;
            --text-primary: #303133;
            --text-regular: #606266;
            --text-secondary: #909399;
            --border-color: #dcdfe6;
            --bg-color: #f5f7fa;
            --white: #ffffff;
            --danger: #f56c6c;
            --success: #67c23a;
            --warning: #e6a23c;
            --sidebar-width: 240px;
            --header-height: 60px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: var(--white);
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-logo {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sidebar-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .sidebar-nav {
            padding: 20px 0;
        }
        .nav-section {
            margin-bottom: 20px;
        }
        .nav-section-title {
            padding: 10px 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: var(--white);
            border-left: 3px solid var(--primary);
        }
        .nav-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
        }
        .header {
            position: sticky;
            top: 0;
            height: var(--header-height);
            background: var(--white);
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 50;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .user-info:hover {
            background: var(--bg-color);
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            min-width: 160px;
            display: none;
            z-index: 100;
        }
        .user-info:hover .dropdown-menu {
            display: block;
        }
        .page-content {
            padding: 30px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .page-title {
            font-size: 24px;
            color: var(--text-primary);
        }
        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .form-container {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .form-section {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        .form-section:last-child {
            border-bottom: none;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }
        .form-group .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.1);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-regular);
        }
        .form-actions {
            padding: 20px 24px;
            background: var(--bg-color);
            border-radius: 0 0 12px 12px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        /* 拖拽上传区域 */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(64, 158, 255, 0.02);
        }
        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-area p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .upload-area strong {
            color: var(--primary);
        }
        /* 图片预览 */
        .image-preview {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .preview-item {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-item .remove {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🏢 精品独立站</div>
            <div class="sidebar-subtitle">CMS 内容管理系统</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">概览</div>
                <a href="admin-dashboard.html" class="nav-item">
                    <span class="icon">📊</span>
                    <span>仪表盘</span>
                </a>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">内容管理</div>
                <a href="admin-products.html" class="nav-item">
                    <span class="icon">📦</span>
                    <span>商品管理</span>
                </a>
                <a href="admin-news.html" class="nav-item">
                    <span class="icon">📰</span>
                    <span>新闻动态</span>
                </a>
                <a href="admin-certificates.html" class="nav-item">
                    <span class="icon">🏆</span>
                    <span>荣誉资质</span>
                </a>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">业务管理</div>
                <a href="admin-inquiries.html" class="nav-item">
                    <span class="icon">📬</span>
                    <span>询盘管理</span>
                </a>
                <a href="admin-orders.html" class="nav-item">
                    <span class="icon">🛒</span>
                    <span>订单管理</span>
                </a>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">系统设置</div>
                <a href="admin-company.html" class="nav-item active">
                    <span class="icon">🏢</span>
                    <span>公司信息</span>
                </a>
                <a href="admin-settings.html" class="nav-item">
                    <span class="icon">⚙️</span>
                    <span>系统设置</span>
                </a>
                <a href="admin-users.html" class="nav-item">
                    <span class="icon">👥</span>
                    <span>用户管理</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <div class="breadcrumb">
                    <a href="admin-dashboard.html">首页</a>
                    <span>/</span>
                    <span>系统设置</span>
                    <span>/</span>
                    <span>公司信息</span>
                </div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <span>管理员</span>
                    <div class="dropdown-menu">
                        <a href="admin-login.html" onclick="logout()">🚪 退出登录</a>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header">
                <h1 class="page-title">公司信息</h1>
                <p class="page-subtitle">编辑公司介绍、发展历程、团队介绍等信息。</p>
            </div>

            <div class="form-container">
                <!-- 基本信息 -->
                <div class="form-section">
                    <div class="section-title">
                        🏢 基本信息
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>公司名称</label>
                            <input type="text" class="form-control" value="精品独立站有限公司" placeholder="请输入公司名称">
                        </div>
                        <div class="form-group">
                            <label>成立时间</label>
                            <input type="date" class="form-control" value="2010-05-20">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>公司简称</label>
                        <input type="text" class="form-control" value="精品独立站" placeholder="请输入公司简称">
                    </div>
                    <div class="form-group">
                        <label>公司口号</label>
                        <input type="text" class="form-control" value="品质生活，从这里开始" placeholder="请输入公司口号">
                    </div>
                </div>

                <!-- 联系方式 -->
                <div class="form-section">
                    <div class="section-title">
                        📞 联系方式
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>联系电话</label>
                            <input type="text" class="form-control" value="400-888-8888" placeholder="请输入联系电话">
                        </div>
                        <div class="form-group">
                            <label>联系邮箱</label>
                            <input type="email" class="form-control" value="contact@example.com" placeholder="请输入联系邮箱">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>公司地址</label>
                        <input type="text" class="form-control" value="某某省某某市某某区某某路88号" placeholder="请输入公司地址">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>传真号码</label>
                            <input type="text" class="form-control" value="010-12345678" placeholder="请输入传真号码">
                        </div>
                        <div class="form-group">
                            <label>官方网站</label>
                            <input type="url" class="form-control" value="https://www.example.com" placeholder="请输入官网地址">
                        </div>
                    </div>
                </div>

                <!-- 公司简介 -->
                <div class="form-section">
                    <div class="section-title">
                        📝 公司简介
                    </div>
                    <div class="form-group">
                        <label>公司简介</label>
                        <textarea class="form-control" rows="5" placeholder="请输入公司简介">精品独立站有限公司成立于2010年，是一家专业从事优质产品销售的电商企业。公司秉承"品质至上、客户第一"的经营理念，致力于为消费者提供高品质的产品和服务。

经过十余年的发展，公司已拥有完善的供应链体系、专业的销售团队和优质的售后服务，产品涵盖多个品类，深受广大消费者信赖和喜爱。</textarea>
                        <p class="hint">建议字数: 500-1000字</p>
                    </div>
                </div>

                <!-- 企业文化 -->
                <div class="form-section">
                    <div class="section-title">
                        💼 企业文化
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>愿景</label>
                            <textarea class="form-control" rows="3" placeholder="请输入公司愿景">成为行业领先的优质品牌，让优质产品走进千家万户，服务全球客户。</textarea>
                        </div>
                        <div class="form-group">
                            <label>使命</label>
                            <textarea class="form-control" rows="3" placeholder="请输入公司使命">为消费者提供高品质、高性价比的产品，为员工创造发展平台，为社会创造价值。</textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>价值观</label>
                        <textarea class="form-control" rows="2" placeholder="请输入公司价值观">诚信、创新、卓越、共赢。我们坚持诚信经营，追求技术创新，实现卓越品质，合作共赢。</textarea>
                    </div>
                </div>

                <!-- 展示图片 -->
                <div class="form-section">
                    <div class="section-title">
                        🖼️ 展示图片
                    </div>
                    <div class="form-group">
                        <label>公司图片</label>
                        <div class="upload-area" onclick="alert('上传功能将在正式开发中实现')">
                            <div class="icon">📁</div>
                            <p>点击或拖拽图片到此处上传</p>
                            <p style="margin-top: 10px;"><strong>支持</strong> JPG、PNG 格式，文件大小不超过 5MB</p>
                        </div>
                        <div class="image-preview">
                            <div class="preview-item">
                                <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">
                                    🏢
                                </div>
                                <div class="remove" onclick="this.parentElement.remove()">×</div>
                            </div>
                            <div class="preview-item">
                                <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">
                                    🏭
                                </div>
                                <div class="remove" onclick="this.parentElement.remove()">×</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="form-actions">
                    <button class="btn btn-outline">重置</button>
                    <button class="btn btn-primary" onclick="saveCompanyInfo()">保存信息</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function checkLogin() {
            const loggedIn = localStorage.getItem('adminLoggedIn');
            if (!loggedIn) {
                window.location.href = 'admin-login.html';
            }
        }
        checkLogin();

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin-login.html';
        }

        function saveCompanyInfo() {
            alert('公司信息已保存！');
        }
    </script>
</body>
</html>

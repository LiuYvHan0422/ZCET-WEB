<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 精品独立站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #409eff;
            --primary-dark: #337ecc;
            --text-primary: #303133;
            --text-regular: #606266;
            --text-secondary: #909399;
            --border-color: #dcdfe6;
            --bg-color: #f5f7fa;
            --white: #ffffff;
            --danger: #f56c6c;
            --success: #67c23a;
            --warning: #e6a23c;
            --sidebar-width: 240px;
            --header-height: 60px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: var(--white);
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-logo {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sidebar-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .sidebar-nav {
            padding: 20px 0;
        }
        .nav-section {
            margin-bottom: 20px;
        }
        .nav-section-title {
            padding: 10px 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: var(--white);
            border-left: 3px solid var(--primary);
        }
        .nav-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
        }
        .header {
            position: sticky;
            top: 0;
            height: var(--header-height);
            background: var(--white);
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 50;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .user-info:hover {
            background: var(--bg-color);
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            min-width: 160px;
            display: none;
            z-index: 100;
        }
        .user-info:hover .dropdown-menu {
            display: block;
        }
        .page-content {
            padding: 30px;
        }
        .page-header {
            margin-bottom: 30px;
        }
        .page-title {
            font-size: 24px;
            color: var(--text-primary);
        }
        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .settings-container {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .settings-section {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        .settings-section:last-child {
            border-bottom: none;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }
        .form-group .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.1);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-regular);
        }
        .form-actions {
            padding: 20px 24px;
            background: var(--bg-color);
            border-radius: 0 0 12px 12px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary);
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .switch-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .switch-label-text {
            flex: 1;
        }
        .switch-label-text span {
            display: block;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }
        .switch-label-text small {
            font-size: 12px;
            color: var(--text-secondary);
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🏢 精品独立站</div>
            <div class="sidebar-subtitle">CMS 内容管理系统</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">概览</div>
                <a href="admin-dashboard.html" class="nav-item">
                    <span class="icon">📊</span>
                    <span>仪表盘</span>
                </a>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">内容管理</div>
                <a href="admin-products.html" class="nav-item">
                    <span class="icon">📦</span>
                    <span>商品管理</span>
                </a>
                <a href="admin-news.html" class="nav-item">
                    <span class="icon">📰</span>
                    <span>新闻动态</span>
                </a>
                <a href="admin-certificates.html" class="nav-item">
                    <span class="icon">🏆</span>
                    <span>荣誉资质</span>
                </a>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">业务管理</div>
                <a href="admin-inquiries.html" class="nav-item">
                    <span class="icon">📬</span>
                    <span>询盘管理</span>
                </a>
                <a href="admin-orders.html" class="nav-item">
                    <span class="icon">🛒</span>
                    <span>订单管理</span>
                </a>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">系统设置</div>
                <a href="admin-company.html" class="nav-item">
                    <span class="icon">🏢</span>
                    <span>公司信息</span>
                </a>
                <a href="admin-settings.html" class="nav-item active">
                    <span class="icon">⚙️</span>
                    <span>系统设置</span>
                </a>
                <a href="admin-users.html" class="nav-item">
                    <span class="icon">👥</span>
                    <span>用户管理</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <div class="breadcrumb">
                    <a href="admin-dashboard.html">首页</a>
                    <span>/</span>
                    <span>系统设置</span>
                </div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <span>管理员</span>
                    <div class="dropdown-menu">
                        <a href="admin-login.html" onclick="logout()">🚪 退出登录</a>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header">
                <h1 class="page-title">系统设置</h1>
                <p class="page-subtitle">配置网站的各项参数和功能。</p>
            </div>

            <div class="settings-container">
                <!-- 基本设置 -->
                <div class="settings-section">
                    <div class="section-title">
                        ⚙️ 基本设置
                    </div>
                    <div class="form-group">
                        <label>网站名称</label>
                        <input type="text" class="form-control" value="精品独立站" placeholder="请输入网站名称">
                    </div>
                    <div class="form-group">
                        <label>网站副标题</label>
                        <input type="text" class="form-control" value="品质生活，从这里开始" placeholder="请输入网站副标题">
                    </div>
                    <div class="form-group">
                        <label>网站Logo</label>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div style="width: 80px; height: 80px; background: var(--bg-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px;">
                                🏢
                            </div>
                            <button class="btn btn-outline">上传Logo</button>
                        </div>
                        <p class="hint">建议尺寸: 200x60px，格式: PNG/JPG</p>
                    </div>
                </div>

                <!-- 联系方式 -->
                <div class="settings-section">
                    <div class="section-title">
                        📞 联系方式
                    </div>
                    <div class="form-group">
                        <label>客服电话</label>
                        <input type="text" class="form-control" value="400-888-8888" placeholder="请输入客服电话">
                    </div>
                    <div class="form-group">
                        <label>联系邮箱</label>
                        <input type="email" class="form-control" value="contact@example.com" placeholder="请输入联系邮箱">
                    </div>
                    <div class="form-group">
                        <label>公司地址</label>
                        <input type="text" class="form-control" value="某某省某某市某某区某某路88号" placeholder="请输入公司地址">
                    </div>
                    <div class="form-group">
                        <label>工作时间</label>
                        <input type="text" class="form-control" value="周一至周五 9:00-18:00" placeholder="请输入工作时间">
                    </div>
                </div>

                <!-- SEO设置 -->
                <div class="settings-section">
                    <div class="section-title">
                        🔍 SEO设置
                    </div>
                    <div class="form-group">
                        <label>网站关键词</label>
                        <input type="text" class="form-control" value="精品,独立站,电商,优质产品" placeholder="请输入网站关键词，用逗号分隔">
                    </div>
                    <div class="form-group">
                        <label>网站描述</label>
                        <textarea class="form-control" rows="3" placeholder="请输入网站描述">精品独立站是一家致力于提供优质产品的电商平台，我们精选各类优质商品，满足您的各种需求。</textarea>
                    </div>
                </div>

                <!-- 功能开关 -->
                <div class="settings-section">
                    <div class="section-title">
                        🔌 功能开关
                    </div>
                    <div class="form-group">
                        <div class="switch-label">
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                            <div class="switch-label-text">
                                <span>询盘功能</span>
                                <small>开启后前台显示询盘按钮</small>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="switch-label">
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                            <div class="switch-label-text">
                                <span>邮件通知</span>
                                <small>有新询盘时发送邮件通知</small>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="switch-label">
                            <label class="switch">
                                <input type="checkbox">
                                <span class="slider"></span>
                            </label>
                            <div class="switch-label-text">
                                <span>维护模式</span>
                                <small>开启后前台显示维护中页面</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="form-actions">
                    <button class="btn btn-outline">重置</button>
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function checkLogin() {
            const loggedIn = localStorage.getItem('adminLoggedIn');
            if (!loggedIn) {
                window.location.href = 'admin-login.html';
            }
        }
        checkLogin();

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin-login.html';
        }

        function saveSettings() {
            alert('设置已保存！');
        }
    </script>
</body>
</html>
